<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>AutoWorld | Banks</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="assets/css/styles.css" rel="stylesheet"/>
</head>
<body>
  <div id="aw-header"></div>

  <main class="container my-5">
    <div class="d-flex flex-column flex-md-row align-items-md-end justify-content-between gap-2">
      <div>
        <h1 class="fw-semibold mb-1">Partner Banks</h1>
        <div class="aw-muted">Example banks list (for eProject).</div>
      </div>
      <a class="btn btn-primary" href="finance.html">Open EMI Calculator</a>
    </div>

    <div class="card aw-card mt-4">
      <div class="card-body p-4">
        <div class="table-responsive">
          <table class="table align-middle mb-0" id="banksTable">
            <thead>
              <tr>
                <th>Bank</th>
                <th>Markup Rate (Yearly)</th>
                <th>Notes</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="alert alert-warning mt-4" role="alert">
      Rates are sample only. Actual rates depend on policy and customer profile.
    </div>
  </main>

  <div id="aw-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/layout.js"></script>
  <script src="assets/js/data.js"></script>
  <script>
    window.AutoWorldLayout.render('finance');
    (function(){
      var tbody=document.querySelector('#banksTable tbody');
      tbody.innerHTML=window.AutoWorldData.banks.map(function(b){
        return '<tr>'
          +'<td class="fw-semibold">'+b.name+'</td>'
          +'<td>'+(Math.round(b.markupRate*1000)/10).toFixed(1)+'%</td>'
          +'<td>Auto loan available (terms apply)</td>'
          +'</tr>';
      }).join('');
    })();
  </script>
</body>
</html>
