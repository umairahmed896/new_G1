<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body>
    <div class="container mt-5">
        <h1>Cart Functionality Test</h1>
        
        <div class="row">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <h5>Test Car 1</h5>
                        <p>Price: PKR 4,500,000</p>
                        <button class="btn btn-success" onclick="testAddToCart('civic', 'car', 'Honda Civic', 'images/honda civic.jpg', 4500000, 'Honda')">
                            <i class="bi bi-cart-plus"></i> Add to Cart
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <h5>Test Car 2</h5>
                        <p>Price: PKR 3,800,000</p>
                        <button class="btn btn-success" onclick="testAddToCart('corolla', 'car', 'Toyota Corolla', 'images/toyota corolla.jpg', 3800000, 'Toyota')">
                            <i class="bi bi-cart-plus"></i> Add to Cart
                        </button>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="mt-4">
            <button class="btn btn-primary" onclick="testCartSystem()">Test Cart System</button>
            <button class="btn btn-info" onclick="showCartItems()">Show Cart Items</button>
            <button class="btn btn-warning" onclick="clearCart()">Clear Cart</button>
            <button class="btn btn-success" onclick="goToCartPage()">Go to Cart Page</button>
        </div>
        
        <div class="mt-4">
            <h3>Console Output:</h3>
            <div id="consoleOutput" class="border p-3 bg-light" style="height: 300px; overflow-y: auto; font-family: monospace;">
                <!-- Console output will appear here -->
            </div>
        </div>
    </div>

    <script src="assets/js/data.js"></script>
    <script src="assets/js/cart.js"></script>
    
    <script>
        // Override console.log to display on page
        const originalLog = console.log;
        const originalError = console.error;
        const consoleOutput = document.getElementById('consoleOutput');
        
        function addToConsole(message, type = 'log') {
            const div = document.createElement('div');
            div.className = type === 'error' ? 'text-danger' : 'text-dark';
            div.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            consoleOutput.appendChild(div);
            consoleOutput.scrollTop = consoleOutput.scrollHeight;
        }
        
        console.log = function(...args) {
            originalLog.apply(console, args);
            addToConsole(args.join(' '), 'log');
        };
        
        console.error = function(...args) {
            originalError.apply(console, args);
            addToConsole(args.join(' '), 'error');
        };
        
        function testAddToCart(id, type, name, image, price, brand) {
            console.log(`🧪 Testing addToCart with: ${name}`);
            
            try {
                const result = addToCart(id, type, name, image, price, brand);
                console.log(`✅ addToCart returned: ${result}`);
                
                if (result) {
                    console.log(`🎉 Success! ${name} added to cart`);
                } else {
                    console.log(`❌ Failed to add ${name} to cart`);
                }
            } catch (error) {
                console.error(`💥 Error adding ${name} to cart:`, error.message);
            }
        }
        
        function testCartSystem() {
            console.log('🔍 Starting complete cart system test...');
            
            // Test 1: Check if AutoWorldCart is available
            console.log('📋 Test 1: AutoWorldCart availability');
            console.log(`AutoWorldCart available: ${typeof window.AutoWorldCart !== 'undefined'}`);
            
            if (typeof window.AutoWorldCart !== 'undefined') {
                // Test 2: Check cart items
                console.log('📋 Test 2: Get cart items');
                const items = window.AutoWorldCart.getCartItems();
                console.log(`Cart items: ${JSON.stringify(items, null, 2)}`);
                
                // Test 3: Check cart total
                console.log('📋 Test 3: Get cart total');
                const total = window.AutoWorldCart.getCartTotal();
                console.log(`Cart total: ${total}`);
                
                // Test 4: Check cart summary
                console.log('📋 Test 4: Get cart summary');
                const summary = window.AutoWorldCart.getCartSummary();
                console.log(`Cart summary: ${JSON.stringify(summary, null, 2)}`);
                
                console.log('✅ All cart system tests completed!');
            } else {
                console.error('❌ AutoWorldCart is not available!');
            }
        }
        
        function showCartItems() {
            console.log('🛒 Current cart items:');
            
            if (typeof window.AutoWorldCart !== 'undefined') {
                const items = window.AutoWorldCart.getCartItems();
                
                if (items.length === 0) {
                    console.log('📦 Cart is empty');
                } else {
                    items.forEach((item, index) => {
                        console.log(`${index + 1}. ${item.name} - ${item.brand} - PKR ${item.price.toLocaleString()} x ${item.quantity}`);
                    });
                }
            } else {
                console.error('❌ Cart system not available');
            }
        }
        
        function clearCart() {
            console.log('🗑️ Clearing cart...');
            
            if (typeof window.AutoWorldCart !== 'undefined') {
                window.AutoWorldCart.clearCart();
                console.log('✅ Cart cleared');
            } else {
                console.error('❌ Cart system not available');
            }
        }
        
        function goToCartPage() {
            console.log('🛍️ Redirecting to cart page...');
            window.location.href = 'cart.html';
        }
        
        // Auto-test on page load
        window.addEventListener('load', function() {
            setTimeout(function() {
                console.log('🚀 Page loaded, starting auto-test...');
                testCartSystem();
            }, 1000);
        });
    </script>
</body>
</html>
