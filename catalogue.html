<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>AutoWorld | Catalogue</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="assets/css/styles.css" rel="stylesheet"/>
</head>
<body>
  <div id="aw-header"></div>

  <main class="container my-5">
    <div class="d-flex flex-column flex-md-row align-items-md-end justify-content-between gap-2">
      <div>
        <h1 class="fw-semibold mb-1">Car Catalogue</h1>
        <div class="aw-muted">Browse our complete collection with advanced filters.</div>
      </div>
      <div class="d-flex gap-2">
        <!-- Filter Options -->
        <div class="dropdown">
          <button class="btn btn-outline-primary dropdown-toggle" type="button" data-bs-toggle="dropdown">
            <i class="bi bi-funnel-fill me-1"></i>
            <span id="filterLabel">All Filters</span>
          </button>
          <ul class="dropdown-menu">
            <li><a class="dropdown-item" href="#" onclick="filterCars('all')">All Cars</a></li>
            <li><a class="dropdown-item" href="#" onclick="filterCars('brand')">By Brand</a></li>
            <li><a class="dropdown-item" href="#" onclick="filterCars('category')">By Category</a></li>
            <li><a class="dropdown-item" href="#" onclick="filterCars('price')">By Price</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item" href="#" onclick="filterCars('low-high')">Price: Low to High</a></li>
            <li><a class="dropdown-item" href="#" onclick="filterCars('high-low')">Price: High to Low</a></li>
          </ul>
        </div>
        <a class="btn btn-success" href="https://wa.me/923001234567" target="_blank">
          <i class="bi bi-whatsapp me-1"></i>
          WhatsApp Chat
        </a>
        <a class="btn btn-primary" href="contact.html">
          <i class="bi bi-telephone-fill me-1"></i>
          Quick Contact
        </a>
      </div>
    </div>

    <div class="row g-4 mt-2" id="catalogueGrid"></div>
  </main>

  <div id="aw-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/layout.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/cart.js"></script>
  <script src="assets/js/catalogue.js"></script>
  <script>
    // Filter Functionality
    let currentFilter = 'all';
    let currentSort = 'default';
    
    function filterCars(filterType) {
      currentFilter = filterType;
      const filterLabel = document.getElementById('filterLabel');
      const grid = document.getElementById('catalogueGrid');
      const cars = window.AutoWorldData.cars || [];
      
      let filteredCars = [...cars];
      
      switch(filterType) {
        case 'brand':
          filteredCars = cars.sort((a, b) => a.brand.localeCompare(b.brand));
          filterLabel.textContent = 'By Brand';
          break;
        case 'category':
          filteredCars = cars.sort((a, b) => a.category.localeCompare(b.category));
          filterLabel.textContent = 'By Category';
          break;
        case 'price':
          filteredCars = cars.sort((a, b) => a.price - b.price);
          filterLabel.textContent = 'By Price (Low to High)';
          currentSort = 'low-high';
          break;
        case 'low-high':
          filteredCars = cars.sort((a, b) => a.price - b.price);
          filterLabel.textContent = 'Price: Low to High';
          currentSort = 'low-high';
          break;
        case 'high-low':
          filteredCars = cars.sort((a, b) => b.price - a.price);
          filterLabel.textContent = 'Price: High to Low';
          currentSort = 'high-low';
          break;
        default:
          filterLabel.textContent = 'All Filters';
          break;
      }
      
      // Re-render the grid with filtered/sorted cars
      grid.innerHTML = filteredCars.map(car => window.AutoWorldCatalogue.card(car)).join('');
      
      // Re-initialize reveal animations
      if(window.AutoWorldReveal && window.AutoWorldReveal.revealAll){
        setTimeout(function(){
          window.AutoWorldReveal.revealAll();
        },100);
      }
    }
    
    window.AutoWorldLayout.render('catalogue');
    window.AutoWorldCatalogue.render();
    if(window.AutoWorldReveal && window.AutoWorldReveal.revealAll){
      setTimeout(function(){
        window.AutoWorldReveal.revealAll();
      },200);
    }
  </script>
</body>
</html>
